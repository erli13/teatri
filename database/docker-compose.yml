version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: theatre_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: theatre_db
    ports:
      - "5432:5432"
    volumes:
      - theatre_pgdata:/var/lib/postgresql/data

volumes:
  theatre_pgdata:
